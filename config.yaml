# Falcon Gaze — central tunable configuration.
#
# Single source of truth for the swarm's tunable numbers. Code reads these via
# drone_sdk/config.py (load_config() / CONFIG), so to retune the swarm you edit
# here and nowhere else. Point the FALCON_CONFIG env var at another file to use
# an alternative config without editing this one.
#
# NOT here (by design): world spawn coordinates and the leader's mission route
# geometry — those stay with the code / mission folder respectively.

# ── Swarm speeds ────────────────────────────────────────────────────────────
# Leader cruise is the single knob for the whole swarm's pace. Follower forward
# and reverse caps are derived from it via these ratios, so they stay matched
# (a follower can close a gap but never dramatically outrun the leader, and it
# backs off gently rather than slamming into reverse). CV tracking degrades at
# high speed, so raise leader_cruise_m_s gradually.
speeds:
  leader_cruise_m_s: 0.35       # was 0.4; followers still could not keep up through turns, so slow the leader further
                                # while preserving follower catch-up headroom with the ratio below.
                                # Previously 0.8; followers were saturating fwd=1.44 yet still lagging to ~4.8 m, so the
                                # leader's hard turns (yaw -109->-142->-91) threw it out of frame -> follower 1 lost it.
                                # A slower leader gives the chain margin to hold formation through turns.
  follower_forward_ratio: 4.1   # was 3.6; keeps follower max forward ~=1.44 m/s (0.35*4.1) — full catch-up
                                # headroom is preserved even though the leader is slower.
  follower_reverse_ratio: 0.4   # follower max reverse = leader_cruise * this

# ── Follower controller (vision -> velocity gains, dead zones, timeouts) ─────
# Forward/reverse speed caps are NOT here — they come from `speeds` above.
follower_control:
  desired_target_size: 100.0    # was 90 (~2.6 m); followers actually held ~3.5-4.8 m (blob shrank to ~50 px, near the
                                # 45 px acquire floor) so turns dropped the leader out of frame. 100 px (~2.35 m) keeps
                                # them closer with a bigger, more robust blob — still behind the 2.5 m spacing, clear of
                                # the ~1.7 m wake zone that crashed follower 1 at size 130.
  kp_yaw: 1.0
  kp_forward: 0.10             # was 0.08; stronger horizontal catch-up so followers close gaps sooner before turns
                                # push the target out of frame.
                                # Previously 0.05; too weak to actually close the gap (followers sat at max fwd yet stayed ~4 m
                                # back). Stronger so they pull up to the 100 px hold instead of trailing out of FOV.
  kp_vertical: 0.01             # was 0.02; damp vertical chase because logs showed followers drifting far above target altitude
  max_yaw_rate: 28.0            # was 22; bear_err hit ~19 deg on the leader's turns and yaw lagged, letting the leader
                                # slide out of frame. A bit faster keeps it centered through turns (still gentle enough
                                # to avoid the spin-on-relock crash).
  max_vertical_speed: 0.2       # m/s; cap climb/dive so camera geometry does not drift away from the 2.5 m route
  yaw_dead_zone_deg: 1.0
  vertical_dead_zone_deg: 1.0
  size_dead_zone: 5.0           # px; ignore size error smaller than this
  lost_timeout: 3.0             # was 2.0; the leader's turns caused brief blink-outs that tripped SEARCH and stalled the
                                # whole chain behind follower 1 ("stuck"). Ride out the short dropout instead.
  observation_timeout: 0.5      # s; older observations are treated as stale
  lost_frames_threshold: 5      # was 3; tolerate a longer detection gap through a turn before declaring the target lost
  reacquire_frames: 2           # was 3; resume FOLLOW after 2 good frames — fast enough to keep up, but >1 so a
                                # single stray blob during SEARCH can't lock the wrong drone (-> spin/crash)
  smoothing_alpha: 0.35         # was 0.5; less lag so forward/yaw commands react sooner to target motion
  search_yaw_rate: 10.0         # legacy; superseded by the scan sweep below
  search_yaw_sweep_deg: 30.0    # half-angle of the bounded SEARCH yaw sweep
  search_vertical_speed: 0.1    # was 0.3; minimize altitude drift while scanning for the optical target
  search_period_s: 8.0          # s for one full SEARCH sweep cycle
  control_rate_hz: 10.0
  yaw_sign: 1.0
  vertical_sign: 1.0
  lost_command_memory_s: 1.2    # was 0.6; hold the last yaw/vertical correction longer through a turn-induced dropout
                                # so the follower keeps tracking the leader's arc instead of freezing and falling behind

# ── Perception / acquisition thresholds ──────────────────────────────────────
perception:
  acquire_min_target_size: 45.0   # px; smaller -> target too far to lock
  acquire_max_target_size: 180.0  # px; larger -> target too close to lock

# ── Follower placement relative to the leader (the spawn train) ──────────────
# Where the followers spawn behind the leader. World layout (the leader's own
# spawn coordinates) stays in code; this only controls the train formation.
formation:
  train_spacing_m: 2.5      # gap between consecutive drones in the train
  spawn_z_m: 1.4            # spawn altitude (m)
  train_yaw_rad: 3.7346     # heading the train is laid out along

# ── Mission runtime: rates, settle/timeout durations, FINISH/recovery timing ─
runtime:
  follower_count: 3
  common_alt_m: 2.5             # leader/cruise altitude
  ekf_settle_s: 15.0
  hover_settle_s: 8.0
  takeoff_timeout_s: 35.0
  takeoff_tolerance_m: 1.5      # accept this far below target (SITL settles low)
  takeoff_airborne_fraction: 0.6
  control_hz: 10.0
  beacon_hz: 20.0
  truth_log_hz: 1.0
  watchdog_s: 300.0             # overridable via the WATCHDOG_S env var
  finish_broadcast_s: 15.0
  finish_descent_speed_ms: 0.6
  finish_descent_timeout_s: 25.0
  finish_ground_alt_m: 1.2
  acquire_hold_s: 45.0          # leader hovers first so followers form up
  route_recovery_pause_s: 30.0
  route_recovery_poll_s: 0.5
  step_m: 1.0                   # leader route step size

# ── MAVSDK ports (drone N = base + N) ────────────────────────────────────────
ports:
  mavsdk_udp_base: 14540
  mavsdk_grpc_base: 50051
